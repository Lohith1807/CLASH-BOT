<!DOCTYPE html>
<html>
<head>
    <title>Clash of Clans Coordinate Finder (Stitched)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #d9a01e;
            margin-bottom: 5px;
        }
        p {
            color: #aaa;
            margin-top: 0;
        }
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1800px;
        }
        .canvas-area {
            position: relative;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: auto;
            max-height: 85vh;
        }
        canvas {
            border: 1px solid #444;
            cursor: crosshair;
        }
        .sidebar {
            width: 350px;
            background: #252525;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .stat-box {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 5px;
            border-left: 4px solid #d9a01e;
        }
        .stat-box span {
            font-weight: bold;
            color: #fff;
        }
        textarea {
            width: 100%;
            height: 250px;
            background: #1e1e1e;
            color: #00ff00;
            border: 1px solid #444;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
        }
        button {
            background: #d9a01e;
            color: #1a1a1a;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #ffd700;
        }
        .point-item {
            display: flex;
            justify-content: space-between;
            background: #333;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 14px;
        }
        .point-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🏰 CoC Stitched Coordinate & Dimension Finder</h1>
    <p>Click on any level badge to log its coordinates. The coordinate output automatically outputs clean JSON for copy-pasting!</p>
    
    <div class="container">
        <div class="canvas-area">
            <canvas id="cocCanvas"></canvas>
        </div>
        <div class="sidebar">
            <div class="stat-box">
                <div>Hovered: X: <span id="hoverX">-</span>, Y: <span id="hoverY">-</span></div>
                <div>Last Click: X: <span id="clickX">-</span>, Y: <span id="clickY">-</span></div>
            </div>
            
            <div class="stat-box">
                <div>Stitched Dimensions:</div>
                <div>Width: <span id="canvasW">-</span> px</div>
                <div>Height: <span id="canvasH">-</span> px</div>
            </div>

            <button onclick="clearPoints()">Clear All Points</button>
            
            <h3>Logged Points JSON</h3>
            <textarea id="jsonOutput" readonly></textarea>
            
            <h3>Point List</h3>
            <div class="point-list" id="pointList"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('cocCanvas');
        const ctx = canvas.getContext('2d');
        const points = [];

        // Load images and stitch them
        const img1 = new Image();
        const img2 = new Image();

        img1.src = '../assets/images/coc.jpg';
        img2.src = '../assets/images/coc2.jpg';

        let loadedCount = 0;
        function onImageLoad() {
            loadedCount++;
            if (loadedCount === 2) {
                const width = Math.max(img1.width, img2.width);
                const height = img1.height + img2.height;

                canvas.width = width;
                canvas.height = height;

                document.getElementById('canvasW').innerText = width;
                document.getElementById('canvasH').innerText = height;

                // Stitch vertically
                ctx.drawImage(img1, 0, 0);
                ctx.drawImage(img2, 0, img1.height);
                
                drawSavedPoints();
            }
        }

        img1.onload = onImageLoad;
        img2.onload = onImageLoad;

        // Hover tracking
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            document.getElementById('hoverX').innerText = x;
            document.getElementById('hoverY').innerText = y;
        });

        // Click tracking
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            
            document.getElementById('clickX').innerText = x;
            document.getElementById('clickY').innerText = y;

            points.push({ x, y });
            updateOutput();
            drawSavedPoints();
        });

        function drawSavedPoints() {
            // Re-render stitched base
            ctx.drawImage(img1, 0, 0);
            ctx.drawImage(img2, 0, img1.height);

            // Draw all logged points as clean yellow dots
            points.forEach((p, idx) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#00ff00';
                ctx.fill();

                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.font = 'bold 12px sans-serif';
                ctx.fillStyle = '#00ff00';
                ctx.fillText(`#${idx + 1}`, p.x + 8, p.y + 4);
            });
        }

        function updateOutput() {
            // Update Textarea with clean JSON Array format
            const json = JSON.stringify(points, null, 4);
            document.getElementById('jsonOutput').value = json;

            // Update Point List display
            const list = document.getElementById('pointList');
            list.innerHTML = '';
            points.forEach((p, idx) => {
                const item = document.createElement('div');
                item.className = 'point-item';
                item.innerHTML = `<span>Point #${idx + 1}</span> <span>X: ${p.x}, Y: ${p.y}</span>`;
                list.appendChild(item);
            });
        }

        function clearPoints() {
            points.length = 0;
            updateOutput();
            drawSavedPoints();
        }
    </script>
</body>
</html>
